<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="60%" stop-color="#064e3b" />
      <stop offset="100%" stop-color="#02140e" />
    </radialGradient>
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular background with bright green/teal field borders -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#10b981" stroke-width="8" filter="url(#glow)" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="#047857" stroke-width="4" stroke-dasharray="10 10" />

  <!-- Stadium Field markings -->
  <path d="M 56 256 L 456 256" stroke="#ffffff" stroke-width="4" stroke-opacity="0.3" />
  <circle cx="256" cy="256" r="60" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.3" />

  <!-- Gorgeous Football/Soccer Ball structure in center -->
  <g transform="translate(256, 256) scale(1.1)">
    <!-- Main Ball outer circle -->
    <circle cx="0" cy="0" r="80" fill="#ffffff" stroke="#111827" stroke-width="6" />

    <!-- Pentagonal center -->
    <polygon points="0,-25 24,-7 15,22 -15,22 -24,-7" fill="#111827" />

    <!-- Pentagons to edge vertices and connecting arcs -->
    <line x1="0" y1="-25" x2="0" y2="-80" stroke="#111827" stroke-width="5" />
    <line x1="24" y1="-7" x2="76" y2="-25" stroke="#111827" stroke-width="5" />
    <line x1="15" y1="22" x2="47" y2="65" stroke="#111827" stroke-width="5" />
    <line x1="-15" y1="22" x2="-47" y2="65" stroke="#111827" stroke-width="5" />
    <line x1="-24" y1="-7" x2="-76" y2="-25" stroke="#111827" stroke-width="5" />

    <!-- Outer pentagons segments -->
    <polygon points="0,-80 -25,-76 -47,-65" fill="none" stroke="#111827" stroke-width="5" />
    <path d="M -47,-65 L -76,-25 A 80 80 0 0 0 -80 0 L -76, 25" fill="none" stroke="#111827" stroke-width="5" />
    <polygon points="-76,25 -47,65 -15,22" fill="#111827" fill-opacity="0.15" stroke="#111827" stroke-width="5" />
    <polygon points="15,22 47,65 76,25" fill="#111827" fill-opacity="0.15" stroke="#111827" stroke-width="5" stroke-linecap="round" />
    <polygon points="76,-25 47,-65 0,-80" fill="#111827" fill-opacity="0.15" stroke="#111827" stroke-width="5" />
  </g>

  <!-- Crown/Trophy Star details on top of ball to emphasize champions vibe -->
  <path d="M 256 60 L 270 95 L 305 95 L 275 115 L 288 150 L 256 128 L 224 150 L 237 115 L 207 95 L 242 95 Z" fill="url(#goldGrad)" filter="url(#glow)" stroke="#ffffff" stroke-width="2" />
  
  <!-- "مرتدة" Dynamic Neon Text styled elegantly at the bottom -->
  <text x="256" y="445" font-family="'Inter', system-ui, sans-serif" font-weight="900" font-size="52" fill="#ffffff" text-anchor="middle" letter-spacing="4" filter="url(#glow)">
    مُـرْتَـدَّة
  </text>
</svg>
